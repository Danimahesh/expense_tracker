name: expense_tracker
description: A premium offline expense tracker with custom billing cycles.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local database (offline storage)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Formatting
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.69.0

  # Export / share
  share_plus: ^10.0.2
  pdf: ^3.11.1
  printing: ^5.13.2
  excel: ^4.0.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron.ttf
